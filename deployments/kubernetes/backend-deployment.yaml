apiVersion: v1
kind: Namespace
metadata:
  name: tigercasino
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tigercasino-config
  namespace: tigercasino
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "tigercasino"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
---
apiVersion: v1
kind: Secret
metadata:
  name: tigercasino-secrets
  namespace: tigercasino
type: Opaque
stringData:
  DB_USER: "postgres"
  DB_PASSWORD: "changeme"
  JWT_SECRET: "your-jwt-secret-change-in-production"
  ADMIN_EMAIL: "admin@tigercasino.com"
  ADMIN_PASSWORD: "changeme"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tigercasino-backend
  namespace: tigercasino
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tigercasino-backend
  template:
    metadata:
      labels:
        app: tigercasino-backend
    spec:
      containers:
      - name: backend
        image: tigercasino/backend:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: tigercasino-config
        - secretRef:
            name: tigercasino-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: tigercasino
spec:
  selector:
    app: tigercasino-backend
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP
