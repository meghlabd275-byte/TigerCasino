apiVersion: apps/v1
kind: Deployment
metadata:
  name: tigercasino-frontend
  namespace: tigercasino
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tigercasino-frontend
  template:
    metadata:
      labels:
        app: tigercasino-frontend
    spec:
      containers:
      - name: frontend
        image: tigercasino/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://backend-service:8080"
        - name: NEXT_PUBLIC_WS_URL
          value: "ws://backend-service:8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: tigercasino
spec:
  selector:
    app: tigercasino-frontend
  ports:
  - name: http
    port: 80
    targetPort: 3000
  type: ClusterIP
